<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>apple royale</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: url("./assets/appletreebg.png") center/cover no-repeat #000;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
        outline: none;
      }
      #hud {
        position: absolute;
        top: 12px;
        left: 12px;
        color: #fff;
        font: 14px/1.4 monospace;
        background: rgba(0, 0, 0, 0.35);
        padding: 6px 10px;
        border-radius: 4px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">A/D or ←/→ move &nbsp; SPACE jump</div>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
    <script src="sliceBurst.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const demo = params.get("demo");
      const gameScript = document.createElement("script");
      gameScript.src = demo === "3d" ? "game2.js" : "game.js";
      document.body.appendChild(gameScript);
    </script>
  </body>
</html>
